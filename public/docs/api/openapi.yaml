      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                offered:
                  type: array
                  items:
                    type: string
                current:
                  type: string
              required:
              - offered
              - current
      responses:
        '200':
          description: Selected SemVer string, or undefined.
          content:
            application/json:
              schema:
                type: string
