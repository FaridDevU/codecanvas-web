  - AHP Lifecycle
  - AHP Resource
  - AHP Root
  - AHP Session
  - AHP Terminal
  - AHP Changeset
  - AHP Resource Watch
  - AHP Telemetry (OTLP)
- name: Workbench Commands
  tags:
  - Commands
- name: Design Editor
  tags:
  - Design Bridge (penpal)
  - HTML Write-back
  - Design Bridge (workbench)
  - Editor Engine
- name: Rust CLI
  tags:
  - CLI RPC
  - CLI Commands
- name: Agent Sessions
  tags:
  - Sessions
paths:
  /ipc/cliAgent/run:
    post:
      tags:
      - IPC Channels
      operationId: cliAgent.run
      summary: Spawn a coding-agent CLI headless and stream output
      description: |-
        ICliAgentService.run on the cliAgent main-process ProxyChannel. Spawns claude/codex via plain pipes (not a PTY) in electron-main, tracks the child by runId, and streams stdout/stderr back as onDidRunEvent chunks. claude-stream-json output is parsed to NDJSON assistant text/tool_use lines. Resolves when the child exits; rejects only on spawn failure.
      x-source: src/vs/platform/cliAgent/common/cliAgent.ts:51 (impl electron-main/cliAgentMainService.ts:45; channel app.ts:1325)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                runId:
                  type: string
                  description: Caller-generated run id; output events are tagged with it.
                spec:
                  $ref: '#/components/schemas/CliRunSpec'
              required:
              - runId
              - spec
              example:
                runId: run-1
                spec:
                  executable: claude
                  args:
                  - -p
                  - --output-format
                  - stream-json
                  - --verbose
                  cwd: C:/proj
                  format: claude-stream-json
                  stdin: Refactor the header
      responses:
        '200':
          description: Return value.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CliRunResult'
                example:
                  exitCode: 0
        default:
          description: Error envelope (failed call / rejected promise / JSON-RPC error).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseError'
  /ipc/cliAgent/cancel:
    post:
      tags:
      - IPC Channels
      operationId: cliAgent.cancel
      summary: Kill a run process tree by handle
      description: |-
        ICliAgentService.cancel. Looks up the live ChildProcess by runId and kills its whole process tree via killTree(pid) - never by name, so unrelated CLIs are not killed. No-op if the run is unknown.
      x-source: src/vs/platform/cliAgent/common/cliAgent.ts:53 (impl cliAgentMainService.ts:130)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                runId:
                  type: string
              required:
              - runId
      responses:
        '200':
          description: Void (fire-and-forget).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmptyObject'
        default:
          description: Error envelope (failed call / rejected promise / JSON-RPC error).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseError'
  /ipc/cliAgent/onDidRunEvent:
    post:
      tags:
      - IPC Channels
      operationId: cliAgent.onDidRunEvent
      summary: 'Event: a text/error chunk from any active run'
      description: |-
        ICliAgentService.onDidRunEvent. Fires for every stdout text chunk and stderr/error of every active run; subscribers filter by runId. Surfaced over the cliAgent channel as an event listener.
      x-source: src/vs/platform/cliAgent/common/cliAgent.ts:49 (impl cliAgentMainService.ts:36)
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmptyObject'
      responses:
        '200':
          description: One streamed event.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CliRunEvent'
        default:
          description: Error envelope (failed call / rejected promise / JSON-RPC error).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseError'
  /ipc/agentHost/subscribe:
    post:
      tags:
      - IPC Channels
      operationId: agentHost.subscribe
      summary: Subscribe to AHP state at a URI, get snapshot
      description: |-
        IAgentService.subscribe on the agentHost MessagePort ProxyChannel (AgentHostIpcChannels.AgentHost). Returns a current-state snapshot + serverSeq, registers clientId against the resource refcount; subsequent mutations arrive via onDidAction.
      x-source: src/vs/platform/agentHost/common/agentService.ts:838
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                resource:
                  $ref: '#/components/schemas/URIString'
                clientId:
                  type: string
              required:
              - resource
              - clientId
      responses:
        '200':
          description: Return value.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StateSnapshot'
        default:
          description: Error envelope (failed call / rejected promise / JSON-RPC error).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseError'
  /ipc/agentHost/unsubscribe:
    post:
      tags:
      - IPC Channels
      operationId: agentHost.unsubscribe
      summary: Drop a clientId from a resource subscription
      description: |-
        IAgentService.unsubscribe. Counterpart to subscribe; decrements the per-resource subscriber refcount, and idle session state may be evicted when the last subscriber leaves.
      x-source: src/vs/platform/agentHost/common/agentService.ts:845
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                resource:
                  $ref: '#/components/schemas/URIString'
                clientId:
                  type: string
              required:
              - resource
              - clientId
      responses:
        '200':
          description: Void.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmptyObject'
        default:
          description: Error envelope (failed call / rejected promise / JSON-RPC error).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseError'
  /ipc/agentHost/dispatchAction:
    post:
      tags:
      - IPC Channels
      operationId: agentHost.dispatchAction
      summary: Dispatch a client action to the server state
      description: |-
        IAgentService.dispatchAction. Applies a client-originated action to server state, runs side effects, and echoes it back via onDidAction for reconciliation. channel is a string URI so authority-less ahp-root:// URIs survive the wire.
      x-source: src/vs/platform/agentHost/common/agentService.ts:880
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                channel:
                  type: string
                  description: Protocol URI.
                action:
                  $ref: '#/components/schemas/StateAction'
                clientId:
                  type: string
                clientSeq:
                  type: integer
              required:
              - channel
              - action
              - clientId
              - clientSeq
      responses:
        '200':
          description: Void (server echoes via onDidAction).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmptyObject'
        default:
          description: Error envelope (failed call / rejected promise / JSON-RPC error).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseError'
  /ipc/agentHost/listSessions:
    post:
      tags:
      - IPC Channels
      operationId: agentHost.listSessions
      summary: List persisted sessions from the agent host
      description: |-
        IAgentService.listSessions. Enumerates persisted sessions across the host registered agent providers.
      x-source: src/vs/platform/agentHost/common/agentService.ts:784
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmptyObject'
      responses:
        '200':
          description: Return value.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AgentSessionMetadata'
        default:
          description: Error envelope (failed call / rejected promise / JSON-RPC error).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseError'
  /ipc/agentHost/createSession:
    post:
      tags:
      - IPC Channels
      operationId: agentHost.createSession
      summary: Create a new agent session
      description: |-
        IAgentService.createSession. Allocates a session (possibly provisional/in-memory until first message) and returns its provider-scheme URI. The service layer returns just URI, unlike IAgent.createSession which returns the full IAgentCreateSessionResult.
      x-source: src/vs/platform/agentHost/common/agentService.ts:787
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                config:
                  $ref: '#/components/schemas/AgentCreateSessionConfig'
      responses:
        '200':
          description: The new session URI.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/URIString'
        default:
          description: Error envelope (failed call / rejected promise / JSON-RPC error).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseError'
  /ipc/agentHost/completions:
    post:
      tags:
      - IPC Channels
      operationId: agentHost.completions
      summary: Resolve @-mention/input completions
      description: |-
        IAgentService.completions. Delegates to the registered IAgentHostCompletionItemProviders to return completion items for a partially typed user-message input. Deliberately takes no CancellationToken (does not round-trip over IPC).
      x-source: src/vs/platform/agentHost/common/agentService.ts:807
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CompletionsParams'
      responses:
        '200':
          description: Return value.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CompletionsResult'
        default:
          description: Error envelope (failed call / rejected promise / JSON-RPC error).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseError'
  /ipc/agentHost/disposeSession:
    post:
      tags:
      - IPC Channels
      operationId: agentHost.disposeSession
      summary: Dispose a session, freeing SDK resources
      description: |-
        IAgentService.disposeSession. Tears down the session in the agent host and frees its SDK resources.
      x-source: src/vs/platform/agentHost/common/agentService.ts:817
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                session:
                  $ref: '#/components/schemas/URIString'
              required:
              - session
      responses:
        '200':
          description: Void.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmptyObject'
        default:
          description: Error envelope (failed call / rejected promise / JSON-RPC error).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseError'
  /ipc/agentHost/shutdown:
    post:
      tags:
      - IPC Channels
      operationId: agentHost.shutdown
      summary: Gracefully shut down all sessions
      description: |-
        IAgentService.shutdown. Gracefully shuts down all sessions and the underlying client.
      x-source: src/vs/platform/agentHost/common/agentService.ts:826
      requestBody:
        required: false
        content:
          application/json:
            schema:
