components:
  schemas:
    EmptyObject:
      type: object
      description: An empty object payload. Used for no-param requests and void/`{}`/`null` returns (EmptyObject {} in the Rust CLI; void in TS).
    ResponseError:
      type: object
      description: Shared error envelope. Models a rejected promise (TS surfaces), a thrown error, or a JSON-RPC 2.0 error object (AHP / CLI RPC). Nothing here is an HTTP error.
      properties:
        code:
          type: integer
          description: Numeric error code where applicable (e.g. AHP -32001..-32011, JSON-RPC -327xx).
        message:
          type: string
        data:
          type: object
          description: Optional structured error data (e.g. an AHP follow-up ResourceRequestParams).
    URIString:
      type: string
      description: A serialized VS Code URI (string form survives the IPC / JSON-RPC wire), e.g. ahp-session:/<uuid>, ahp-root://, file:///...
    CliRunSpec:
      type: object
      description: Spec for a headless CLI run. Source src/vs/platform/cliAgent/common/cliAgent.ts.
      properties:
        executable:
          type: string
          description: CLI name (resolved against known install dirs) or absolute path.
        args:
          type: array
          items:
            type: string
          description: Flags only.
        cwd:
          type: string
        format:
          type: string
          enum:
          - text
          - claude-stream-json
        stdin:
          type: string
          description: Written to the child stdin then closed (claude); omit for codex exec.
      required:
      - executable
      - args
      - cwd
    CliRunResult:
      type: object
      description: Resolves when the child exits; rejects only on spawn failure.
      properties:
        exitCode:
          type: integer
          nullable: true
    CliRunEvent:
      type: object
      description: A streamed chunk tagged with its run id.
      properties:
        runId:
          type: string
        kind:
          type: string
          enum:
          - text
          - error
        value:
          type: string
    StateSnapshot:
      type: object
      description: IStateSnapshot - a state slice (RootState | component state) plus the serverSeq at snapshot time.
      properties:
        state:
          type: object
          description: RootState or component state.
        fromSeq:
          type: integer
          description: serverSeq at snapshot time.
    AgentSessionMetadata:
      type: object
      description: IAgentSessionMetadata (abbreviated).
      properties:
        session:
          $ref: '#/components/schemas/URIString'
        startTime:
          type: integer
        modifiedTime:
          type: integer
        project:
          type: object
          properties:
            uri:
              $ref: '#/components/schemas/URIString'
            displayName:
              type: string
        summary:
          type: string
        status:
          type: string
        activity:
          type: string
        model:
          type: object
        agent:
          type: object
        workingDirectory:
          $ref: '#/components/schemas/URIString'
        customizationDirectory:
          $ref: '#/components/schemas/URIString'
        isRead:
          type: boolean
        isArchived:
          type: boolean
        changesets:
          type: array
          items:
            type: object
    AgentCreateSessionConfig:
      type: object
      description: IAgentCreateSessionConfig - optional configuration for createSession.
      properties:
        provider:
          type: string
        model:
          type: object
        agent:
          type: object
        session:
          $ref: '#/components/schemas/URIString'
        workingDirectory:
          $ref: '#/components/schemas/URIString'
        config:
          type: object
          additionalProperties: true
        activeClient:
          type: object
        fork:
          type: object
          properties:
            session:
              $ref: '#/components/schemas/URIString'
            turnIndex:
              type: integer
            turnId:
              type: string
            turnIdMapping:
              type: object
    AuthenticateParams:
      type: object
      description: RFC 6750-style bearer token push for a protected resource.
      properties:
        resource:
          type: string
        token:
          type: string
      required:
      - resource
      - token
    AuthenticateResult:
      type: object
      properties:
        authenticated:
          type: boolean
    AgentHostSocketInfo:
      type: object
      properties:
        socketPath:
          type: string
    AgentHostInspectInfo:
      type: object
      properties:
        host:
          type: string
        port:
          type: integer
        devtoolsUrl:
          type: string
          description: devtools:// URL.
    AgentHostIpcChannels:
      type: string
      enum:
      - agentHost
      - agentHostLogger
      - agentHostConnectionTracker
      - agentHostProxy
      description: 'const enum of the agent-host MessagePort channel ids: AgentHost, Logger, ConnectionTracker, RemoteProxy.'
    RemoteAgentHostConnectionStatus:
      type: object
      description: Discriminated by kind.
      properties:
        kind:
          type: string
          enum:
          - connected
          - connecting
          - disconnected
          - incompatible
        message:
          type: string
        supportedByClient:
          type: array
          items:
            type: string
        offeredByServer:
          type: array
          items:
            type: string
        vscodeUpgradeMethod:
          type: string
      required:
      - kind
    RemoteAgentHostEntry:
      type: object
      description: A configured remote host (WebSocket | SSH | Tunnel connection).
      properties:
        name:
          type: string
        connectionToken:
          type: string
        connection:
          type: object
          description: WebSocket{type,address} | SSH{type,address,sshConfigHost?,hostName,user?,port?} | Tunnel{type,tunnelId,clusterId,label?,authProvider?}
      required:
      - name
      - connection
    RemoteAgentHostConnectionInfo:
      type: object
      properties:
        address:
          type: string
        name:
          type: string
        clientId:
          type: string
        defaultDirectory:
          type: string
        status:
          $ref: '#/components/schemas/RemoteAgentHostConnectionStatus'
    VscodeUpgradeResult:
      type: object
      description: Result of a host self-upgrade JSON-RPC method.
      additionalProperties: true
    AgentHostFilterEntry:
      type: object
      properties:
        providerId:
          type: string
        label:
          type: string
        address:
          type: string
        status:
          type: string
          enum:
          - disconnected
          - connecting
          - connected
    AgentCustomization:
      type: object
      description: An effective custom agent for a session.
      additionalProperties: true
    Customization:
      type: object
      description: A session customization (plugin/directory container).
      additionalProperties: true
    ClaudeSdkStartupParams:
      type: object
      properties:
        options:
          type: object
          description: claude-agent-sdk Options.
        initializeTimeoutMs:
          type: integer
      required:
      - options
    SdkMcpServerOptions:
      type: object
      properties:
        name:
          type: string
        version:
          type: string
        tools:
          type: array
          items:
            type: object
      required:
      - name
    SdkSessionInfo:
      type: object
      description: '@anthropic-ai/claude-agent-sdk SDKSessionInfo.'
      additionalProperties: true
    SessionMessage:
      type: object
      description: Reconstructed SDK session message.
      additionalProperties: true
    BaseParams:
      type: object
      description: Base every AHP command extends; connection-level commands narrow channel to the literal ahp-root://.
      properties:
        channel:
          $ref: '#/components/schemas/URIString'
      required:
      - channel
    ActionOrigin:
      type: object
      description: Identifies the client that originally dispatched an action; basis of optimistic reconcile.
      properties:
        clientId:
          type: string
        clientSeq:
          type: integer
    StateAction:
      type: object
      description: Discriminated union (on `type`) of all 58 channel StateAction discriminants across root/session/changeset/terminal/resource-watch families.
      properties:
        type:
          type: string
          description: ActionType discriminant, e.g. session/delta, terminal/data, root/agentsChanged.
      required:
      - type
      additionalProperties: true
    ActionEnvelope:
      type: object
      description: Every action delivered server->client is wrapped here.
      properties:
        channel:
          $ref: '#/components/schemas/URIString'
        action:
          $ref: '#/components/schemas/StateAction'
        serverSeq:
          type: integer
        origin:
          $ref: '#/components/schemas/ActionOrigin'
        rejectionReason:
          type: string
          description: Set when the server rejected a client-dispatched action.
      required:
      - channel
      - action
      - serverSeq
    DispatchActionParams:
      type: object
      description: Client->server optimistic write-ahead dispatch notification.
      properties:
        channel:
          $ref: '#/components/schemas/URIString'
        clientSeq:
          type: integer
        action:
          $ref: '#/components/schemas/StateAction'
      required:
      - channel
      - clientSeq
      - action
    Snapshot:
      type: object
      description: A channel state snapshot returned by subscribe/initialize/reconnect.
      additionalProperties: true
    TelemetryCapabilities:
      type: object
      description: 'ahp-otlp: channel URIs / RFC6570 templates ({level} for logs).'
      properties:
        logs:
          $ref: '#/components/schemas/URIString'
        traces:
          $ref: '#/components/schemas/URIString'
        metrics:
          $ref: '#/components/schemas/URIString'
    InitializeParams:
      type: object
      properties:
        channel:
          type: string
          description: Literal 'ahp-root://'.
        protocolVersions:
          type: array
          items:
            type: string
          description: Preference-ordered SemVer list.
        clientId:
          type: string
        initialSubscriptions:
          type: array
          items:
            $ref: '#/components/schemas/URIString'
        locale:
          type: string
      required:
      - channel
      - protocolVersions
      - clientId
    InitializeResult:
      type: object
      properties:
        protocolVersion:
          type: string
        serverSeq:
          type: integer
        snapshots:
          type: array
          items:
            $ref: '#/components/schemas/Snapshot'
        defaultDirectory:
          $ref: '#/components/schemas/URIString'
        completionTriggerCharacters:
          type: array
          items:
            type: string
        telemetry:
          $ref: '#/components/schemas/TelemetryCapabilities'
      required:
      - protocolVersion
      - serverSeq
      - snapshots
    ReconnectParams:
      type: object
      properties:
        channel:
          type: string
        clientId:
          type: string
        lastSeenServerSeq:
          type: integer
        subscriptions:
          type: array
          items:
            $ref: '#/components/schemas/URIString'
      required:
      - channel
      - clientId
      - lastSeenServerSeq
      - subscriptions
    ReconnectResult:
      type: object
      description: ReconnectReplayResult{type:replay; actions[]; missing[]} | ReconnectSnapshotResult{type:snapshot; snapshots[]}.
      properties:
        type:
          type: string
          enum:
          - replay
          - snapshot
        actions:
          type: array
          items:
            $ref: '#/components/schemas/ActionEnvelope'
        missing:
          type: array
          items:
            $ref: '#/components/schemas/URIString'
        snapshots:
          type: array
          items:
            $ref: '#/components/schemas/Snapshot'
      required:
      - type
    AuthRequiredParams:
      type: object
      description: Server->client 'auth/required' notification payload.
      properties:
        channel:
          $ref: '#/components/schemas/URIString'
        resource:
          type: string
        reason:
          type: string
          enum:
          - required
          - expired
      required:
      - channel
      - resource
    ContentEncoding:
      type: string
      enum:
      - base64
      - utf-8
    FsFileType:
      type: string
      enum:
      - file
      - directory
      - symlink
    ResourceReadParams:
      type: object
      properties:
        channel:
          type: string
        uri:
          type: string
        encoding:
          $ref: '#/components/schemas/ContentEncoding'
      required:
      - channel
      - uri
    ResourceReadResult:
      type: object
      properties:
        data:
          type: string
        encoding:
          $ref: '#/components/schemas/ContentEncoding'
        contentType:
          type: string
      required:
      - data
      - encoding
    ResourceWriteParams:
      type: object
      properties:
        channel:
          type: string
        uri:
          $ref: '#/components/schemas/URIString'
        data:
          type: string
        encoding:
          $ref: '#/components/schemas/ContentEncoding'
        contentType:
          type: string
        createOnly:
          type: boolean
        mode:
          type: string
          enum:
          - truncate
          - append
          - insert
        position:
          type: integer
        ifMatch:
          type: string
          description: etag for optimistic concurrency.
      required:
      - channel
      - uri
      - data
      - encoding
    DirectoryEntry:
      type: object
      properties:
        name:
          type: string
        type:
          type: string
          enum:
          - file
          - directory
    ResourceListParams:
      type: object
      properties:
        channel:
          type: string
        uri:
          $ref: '#/components/schemas/URIString'
      required:
      - channel
      - uri
    ResourceListResult:
      type: object
      properties:
        entries:
          type: array
          items:
            $ref: '#/components/schemas/DirectoryEntry'
    ResourceCopyParams:
      type: object
      properties:
        channel:
          type: string
        source:
          $ref: '#/components/schemas/URIString'
        destination:
          $ref: '#/components/schemas/URIString'
        failIfExists:
          type: boolean
      required:
      - channel
      - source
      - destination
    ResourceDeleteParams:
      type: object
      properties:
        channel:
          type: string
        uri:
          $ref: '#/components/schemas/URIString'
        recursive:
          type: boolean
      required:
      - channel
      - uri
    ResourceMoveParams:
      type: object
      properties:
        channel:
          type: string
        source:
          $ref: '#/components/schemas/URIString'
        destination:
          $ref: '#/components/schemas/URIString'
        failIfExists:
          type: boolean
      required:
      - channel
      - source
      - destination
    ResourceResolveParams:
      type: object
      properties:
        channel:
          type: string
        uri:
          $ref: '#/components/schemas/URIString'
        followSymlinks:
          type: boolean
      required:
