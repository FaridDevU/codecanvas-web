  /ipc/agentHost/authenticate:
    post:
      tags:
      - IPC Channels
      operationId: agentHost.authenticate
      summary: Deliver a bearer token for a protected resource
      description: |-
        IAgentService.authenticate - pushes a bearer token for a resource advertised in root state (RFC 6750-style). Used by the workbench auth driver to feed GitHub Copilot tokens to providers.
      x-source: src/vs/platform/agentHost/common/agentService.ts:781
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthenticateParams'
      responses:
        '200':
          description: Return value.
          content:
