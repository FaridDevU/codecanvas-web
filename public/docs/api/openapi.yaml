  /ahp/lifecycle/negotiateVersion:
    post:
      tags:
      - AHP Lifecycle
      operationId: ahpNegotiateVersion
      summary: Server-side protocol version selection algorithm
      description: |-
        Pure helper backing the initialize handshake: picks the highest client-offered version that is caret-compatible with the server current version (majors must match; for 0.x minors must also match; offered must not exceed current). Returns undefined when nothing is compatible, which the server surfaces as -32005. PROTOCOL_VERSION is currently 0.3.0.
