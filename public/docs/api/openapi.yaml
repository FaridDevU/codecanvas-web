              example:
                channel: ahp-root://
                protocolVersions:
                - 0.3.0
                clientId: renderer-1
                initialSubscriptions:
                - ahp-root://
                locale: en
      responses:
        '200':
          description: Return value.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InitializeResult'
                example:
                  protocolVersion: 0.3.0
                  serverSeq: 42
                  snapshots: []
                  completionTriggerCharacters:
                  - '@'
        default:
          description: Error envelope (failed call / rejected promise / JSON-RPC error).
