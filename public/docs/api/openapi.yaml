      summary: Negotiate protocol version and open a connection
      description: |-
        First message a client MUST send. Offers a preference-ordered list of SemVer protocol versions plus a clientId, optional initialSubscriptions, and locale; the server selects one version and returns it with the current serverSeq, snapshots for each initial subscription, optional defaultDirectory, completionTriggerCharacters, and telemetry capabilities. Fails with -32005 UnsupportedProtocolVersion if no offered version is compatible.
