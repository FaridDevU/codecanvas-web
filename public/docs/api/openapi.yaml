openapi: 3.0.3
info:
  title: CodeCanvas Internal API
  version: 2.1.0
  description: |-
    CodeCanvas AI has **no public HTTP REST API**. The operations catalogued here are the
    project's *internal* surface: Electron IPC channels (ProxyChannel), dependency-injection
    services, workbench commands, the Claude agent-host stream-json bridge, the Agent Host
    Protocol (AHP) JSON-RPC channel family, the Design editor penpal bridge, the Design
    workbench postMessage bridge, the Editor engine, the static-HTML write-back functions, and
    the Rust CLI's command tree + JSON/msgpack RPC methods.

    They are modelled as OpenAPI **only so they render and are browsable in a Swagger-style
    console**. Nothing here is reachable over the network. Read each operation as: "call method
    `X` on surface `Y`". The HTTP verb is always `POST` purely as a modelling convention; the
    `path` is a synthetic identifier (`/ipc/{channel}/{method}`, `/service/{name}/{method}`,
    `/cmd/{id}`, `/agent-host/claude/{message}`, `/ahp/{family}/{method}`, `/penpal/{side}/{method}`,
    `/writeback/{fn}`, `/bridge/{group}/{method}`, `/engine/{manager}/{method}`, `/cli/rpc/{method}`,
    `/cli/{command}`). `requestBody` is the parameter shape; the `200` response is the return
    type; the `default` response is the shared error envelope. Every operation cites the real
    source file:line in `x-source`.

    Transports: IPC channels move between Electron processes (renderer <-> main / utility);
    AHP is JSON-RPC 2.0 over URI-addressed channels (renderer <-> agent-host); penpal moves
    between the Design pane and the preview iframe; the workbench bridge is window.postMessage;
    CLI RPC moves between the Rust CLI and the code server over msgpack-RPC / NDJSON.
  contact:
    name: CodeCanvas AI
    url: https://github.com/FaridDevU/CodeCanvas-AI
externalDocs:
  url: docs.html
  description: Prose API reference
servers:
- url: internal://codecanvas
  description: Not a network server. Placeholder so Swagger UI renders; these are in-process / IPC / RPC calls.
tags:
- name: IPC Channels
  description: |-
    Electron main <-> renderer (and renderer <-> utility-process MessagePort) ProxyChannel surfaces. Registered with registerMainProcessRemoteService / ProxyChannel.fromService and consumed via getChannel / ProxyChannel.toService. Covers the cliAgent channel, the agentHost MessagePort channel (IAgentService, ~28 proxied methods) and the agentHostConnectionTracker channel.
- name: Services
  description: |-
    CodeCanvas-specific dependency-injection singletons (createDecorator<I...>). In-process async calls inside the workbench or agent-host process: IAgentHostService (+inherited IAgentConnection), IRemoteAgentHostService, IClaudeAgentSdkService, IAgentHostFilterService, IAgentHostCustomizationService.
- name: Commands
  description: |-
    Workbench commands registered via registerAction2 / CommandsRegistry.registerCommand. Invoked from the command palette, menus, or commandService.executeCommand(id, ...args).
- name: Agent Host (Claude)
  description: |-
    The legacy Claude Code CLI agent-host bridge. The CLI runs one-shot with --output-format stream-json and emits newline-delimited JSON events the main process parses into chat text. Distinct from the AHP channel-family protocol.
- name: AHP Lifecycle
  description: |-
    Agent Host Protocol (AHP) JSON-RPC 2.0 connection lifecycle: initialize / version negotiation, ping, reconnect (replay|snapshot), subscribe / unsubscribe, optimistic dispatchAction, the server->client action envelope, and bearer-token authenticate. PROTOCOL_VERSION 0.3.0.
- name: AHP Resource
  description: |-
    AHP symmetrical (client<->server) filesystem RPC family: read, write, list, copy, delete, move, resolve (stat+realpath), mkdir, and permission request.
- name: AHP Root
  description: |-
    AHP root-channel (ahp-root://) commands, notifications and StateActions: session enumeration/config resolution, sessionAdded/Removed/SummaryChanged, agents/activeSessions/terminals/config changes.
- name: AHP Session
  description: |-
    AHP per-session channel (ahp-session:/<uuid>): create/dispose, fetchTurns, completions, and the full set of session StateAction discriminants (turn/delta/reasoning/tool-call lifecycle, pending messages, input requests, customizations, status flags). Many are clientDispatchable.
- name: AHP Terminal
  description: |-
    AHP per-terminal channel: create/dispose plus terminal StateActions (pty data/input, resize, claim transfer, title/cwd, exit, clear, shell-integration command detection).
- name: AHP Changeset
  description: |-
    AHP changeset channel: invokeChangesetOperation plus changeset StateActions (status, file set/removed, operations changed, cleared).
- name: AHP Resource Watch
  description: |-
    AHP resource-watch channel: createResourceWatch (allocates an ahp-resource-watch:/<id> channel) and the coalesced resourceWatch/changed StateAction batch. Unsubscribing releases the watcher.
- name: AHP Telemetry (OTLP)
  description: |-
    AHP OTLP/JSON telemetry notifications (server->client) on the host telemetry channels: exportLogs, exportTraces, exportMetrics. Ephemeral; not replayed on reconnect.
- name: Design Bridge (penpal)
  description: |-
    The penpal parent<->child message API between the Design editor React bundle (parent) and the preload script injected into the preview iframe (child). 5 parent methods + 41 child methods.
- name: HTML Write-back
  description: |-
    Functions that persist Design visual edits into the real .html source files: the parse5+magic-string range writers (primary) and the DOMParser+outerHTML fallback (applyHtml*), plus asset/identity helpers.
- name: Design Bridge (workbench)
  description: |-
    The codecanvas:bridge postMessage RPC handled by DesignEditorBridge in the workbench: project analysis/dev-server, workspace filesystem, chat-with-context, plus fire-and-forget messages and the outbound fs-change event.
- name: Editor Engine
  description: |-
    The Design editor MobX engine: StyleManager, ActionManager, HistoryManager (transactions + atomic undo groups), CodeManager (write-back / JSX-oid pipeline) and EditorEngine lifecycle.
- name: CLI RPC
  description: |-
    Methods registered on the Rust CLI transport-agnostic RPC dispatcher (msgpack-RPC / NDJSON) over the tunnel/control-server socket. Includes the auto-registered duplex stream-control methods.
- name: CLI Commands
  description: |-
    The argv-level command tree of the Rust CLI (cli/src/commands): agent host/ps/stop/logs/kill, tunnel serve/forward/status/..., serve-web, update, version, ext, status, the default open launch, and hidden command-shell.
- name: Sessions
  description: |-
    The src/vs/sessions surface (the agent-sessions workbench): its DI services (createDecorator singletons: sessions management/providers/part/set-up, chat dashboard, agent-host filter, chat-view factory, tunnel host, code review, session tasks) and the workbench command ids registered via registerAction2 / CommandsRegistry.registerCommand across the sessions list/view, changes view, editor, terminal, account, code-review, agent-feedback and agent-host provider contributions.
x-tagGroups:
